#应用配置
app:
  name: "order-system"
  version: "1.0.0"
  port: 8080

# 日志配置
log:
  level: "info"
  format: "json"
  output: "stdout"

# 数据库配置
database:
  type: "memory"  # memory, postgres, mysql, mongodb等
  host: "localhost"
  port: 5432
  username: "user"
  password: "password"
  database: "order_system"

# 事件总线配置
eventbus:
  type: "memory"  # memory, nats, rabbitmq, redis
  nats:
    url: "nats://localhost:4222"
  rabbitmq:
    url: "amqp://guest:guest@localhost:5672/"
  redis:
    addr: "localhost:6379"
    password: ""
    db: 0

# HTTP服务器配置
http:
  port: 8080
  read_timeout: 30
  write_timeout: 30
  idle_timeout: 60